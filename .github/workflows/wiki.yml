name: Deploy Wiki
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["docs/wiki/**"]
permissions:
  contents: write
jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push wiki pages
        env:
          GH_TOKEN: ${{ secrets.WIKI_PAT }}
        run: |
          rm -rf wiki-dir
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-dir 2>/dev/null || {
            echo "Wiki repo does not exist yet, bootstrapping..."
            mkdir wiki-dir && cd wiki-dir && git init
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          }
          cd wiki-dir
          rm -f *.md
          cp ../docs/wiki/*.md .
          git config user.name "dreamlessx"
          git config user.email "dreamlessx@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes."
          else
            git commit -m "update wiki pages"
            git branch -M master
            git push -u origin master --force
            echo "Wiki updated."
          fi
