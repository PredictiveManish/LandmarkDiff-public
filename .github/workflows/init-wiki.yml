name: Initialize Wiki
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Try direct git init of wiki repo
        env:
          GH_TOKEN: ${{ secrets.WIKI_PAT }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          
          # The wiki repo doesn't exist yet -- we need to create it.
          # GitHub creates the wiki repo when you push to it if you have proper permissions.
          # The issue might be with fine-grained PAT permissions.
          
          # Try creating the wiki repo by pushing with proper git protocol
          cd /tmp
          mkdir wiki-init && cd wiki-init
          git init --bare wiki.git
          cd wiki.git
          
          # Create the content
          cd /tmp
          rm -rf wiki-content && mkdir wiki-content && cd wiki-content
          git init
          git config user.name "dreamlessx"
          git config user.email "dreamlessx@users.noreply.github.com"
          
          # Copy wiki pages
          cp $GITHUB_WORKSPACE/docs/wiki/*.md .
          
          git add -A
          git commit -m "Initialize wiki with comprehensive documentation"
          
          # Try pushing to wiki with different URL patterns
          URLS=(
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
            "https://dreamlessx:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          )
          
          for url in "${URLS[@]}"; do
            echo "Trying: ${url:0:50}..."
            git remote remove origin 2>/dev/null || true
            git remote add origin "$url"
            git branch -M master
            if git push -u origin master 2>&1; then
              echo "SUCCESS with this URL!"
              exit 0
            fi
            echo "Failed, trying next..."
          done
          
          echo "All push attempts failed. Wiki needs manual initialization."
          echo "Go to: https://github.com/${REPO}/wiki/_new"
          exit 1
