<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <!-- Soft amber glow -->
    <filter id="amberGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
    <!-- Subtle mesh glow -->
    <filter id="meshGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)" stroke="url(#ringGrad)" stroke-width="2"/>

  <!-- Subtle inner ring accent -->
  <circle cx="64" cy="64" r="57" fill="none" stroke="#1e40af" stroke-width="0.5" opacity="0.3"/>

  <!-- Face mesh wireframe (enhanced detail) -->
  <g stroke="#3b82f6" stroke-width="0.8" fill="none" opacity="0.75" filter="url(#meshGlow)">
    <!-- Forehead region -->
    <polygon points="44,28 54,24 54,38"/>
    <polygon points="54,24 64,22 54,38"/>
    <polygon points="64,22 74,24 74,38"/>
    <polygon points="74,24 84,28 74,38"/>
    <polygon points="54,38 64,35 74,38"/>
    <polygon points="44,28 54,38 38,42"/>
    <polygon points="84,28 74,38 90,42"/>
    <!-- Eye region - left -->
    <polygon points="38,42 54,38 46,48"/>
    <polygon points="54,38 64,35 56,48"/>
    <polygon points="46,48 56,48 50,44"/>
    <polygon points="38,42 46,48 36,52"/>
    <!-- Eye region - right -->
    <polygon points="90,42 74,38 82,48"/>
    <polygon points="74,38 64,35 72,48"/>
    <polygon points="82,48 72,48 78,44"/>
    <polygon points="90,42 82,48 92,52"/>
    <!-- Mid-face / nose bridge -->
    <polygon points="56,48 64,46 72,48"/>
    <polygon points="36,52 46,48 42,60"/>
    <polygon points="92,52 82,48 86,60"/>
    <polygon points="46,48 56,48 48,60"/>
    <polygon points="82,48 72,48 80,60"/>
    <polygon points="56,48 64,56 48,60"/>
    <polygon points="72,48 64,56 80,60"/>
    <!-- Nose -->
    <polygon points="48,60 64,56 80,60"/>
    <polygon points="48,60 56,68 64,64"/>
    <polygon points="80,60 72,68 64,64"/>
    <polygon points="56,68 64,64 72,68"/>
    <!-- Lower face -->
    <polygon points="42,60 48,60 46,72"/>
    <polygon points="86,60 80,60 82,72"/>
    <polygon points="46,72 56,68 52,78"/>
    <polygon points="82,72 72,68 76,78"/>
    <polygon points="56,68 72,68 64,76"/>
    <polygon points="56,68 64,76 52,78"/>
    <polygon points="72,68 64,76 76,78"/>
    <!-- Chin -->
    <polygon points="52,78 64,76 58,86"/>
    <polygon points="76,78 64,76 70,86"/>
    <polygon points="58,86 64,76 70,86"/>
    <polygon points="58,86 64,94 70,86"/>
  </g>

  <!-- Left-side mesh nodes (original, blue) -->
  <g fill="#60a5fa" opacity="0.8">
    <circle cx="44" cy="28" r="1.8"/>
    <circle cx="54" cy="24" r="1.8"/>
    <circle cx="64" cy="22" r="1.8"/>
    <circle cx="54" cy="38" r="1.8"/>
    <circle cx="64" cy="35" r="1.8"/>
    <circle cx="38" cy="42" r="1.8"/>
    <circle cx="46" cy="48" r="1.8"/>
    <circle cx="56" cy="48" r="1.8"/>
    <circle cx="50" cy="44" r="1.8"/>
    <circle cx="36" cy="52" r="1.8"/>
    <circle cx="48" cy="60" r="1.8"/>
    <circle cx="64" cy="56" r="1.8"/>
    <circle cx="42" cy="60" r="1.8"/>
    <circle cx="46" cy="72" r="1.8"/>
    <circle cx="56" cy="68" r="1.8"/>
    <circle cx="64" cy="64" r="1.8"/>
    <circle cx="52" cy="78" r="1.8"/>
    <circle cx="64" cy="76" r="1.8"/>
    <circle cx="58" cy="86" r="1.8"/>
    <circle cx="64" cy="94" r="1.8"/>
  </g>

  <!-- Right-side static nodes (blue) -->
  <g fill="#60a5fa" opacity="0.8">
    <circle cx="74" cy="24" r="1.8"/>
    <circle cx="74" cy="38" r="1.8"/>
    <circle cx="64" cy="46" r="1.8"/>
    <circle cx="72" cy="68" r="1.8"/>
    <circle cx="70" cy="86" r="1.8"/>
  </g>

  <!-- Deformed nodes on right side (amber, with glow) -->
  <g filter="url(#amberGlow)">
    <circle cx="84" cy="28" r="2.2" fill="#f59e0b"/>
    <circle cx="90" cy="42" r="2.2" fill="#f59e0b"/>
    <circle cx="82" cy="48" r="2.2" fill="#f59e0b"/>
    <circle cx="78" cy="44" r="2.0" fill="#f59e0b"/>
    <circle cx="92" cy="52" r="2.2" fill="#f59e0b"/>
    <circle cx="80" cy="60" r="2.2" fill="#f59e0b"/>
    <circle cx="86" cy="60" r="2.0" fill="#f59e0b"/>
    <circle cx="82" cy="72" r="2.0" fill="#f59e0b"/>
    <circle cx="76" cy="78" r="2.0" fill="#f59e0b"/>
    <circle cx="72" cy="48" r="2.0" fill="#f59e0b"/>
  </g>

  <!-- Deformation indicator arrows -->
  <g stroke="#f59e0b" stroke-width="1.2" fill="none" opacity="0.7">
    <line x1="84" y1="28" x2="87" y2="30"/>
    <line x1="90" y1="42" x2="93" y2="44"/>
    <line x1="82" y1="48" x2="85" y2="50"/>
    <line x1="80" y1="60" x2="83" y2="62"/>
    <line x1="86" y1="60" x2="89" y2="62"/>
  </g>

  <!-- Transformation arrow -->
  <g opacity="0.65">
    <path d="M 97,55 L 107,55" stroke="#f59e0b" stroke-width="1.8" fill="none"/>
    <path d="M 105,52 L 108,55 L 105,58" stroke="#f59e0b" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
  </g>
</svg>
